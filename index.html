<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Barbearia Hebert | Atendimento</title>

<!-- Ícones via CDN (Font Awesome) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<!-- Fontes via Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ==========================================================================
   BARBEARIA HEBERT — CHAT
   Paleta: carvão profundo + dourado envelhecido + creme
   ========================================================================== */

:root {
  --bg-deep:        #14110f;   /* fundo geral, quase preto com calor */
  --bg-panel:       #1c1815;   /* painel do chat */
  --bg-header:      #201a16;   /* cabeçalho */
  --bg-pattern:     #17130f;

  --gold:           #c9a24b;   /* dourado principal */
  --gold-soft:      #e4c878;
  --gold-dim:       #8a6f33;

  --bubble-bot:     #262019;
  --bubble-user:    #3a2f1e;
  --bubble-user-border: #c9a24b33;

  --text-main:      #f2ead9;
  --text-muted:     #a89a86;
  --text-faint:     #6f6355;

  --danger:         #d1594a;

  --radius-lg: 18px;
  --radius-sm: 4px;

  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'Manrope', sans-serif;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
}

body {
  font-family: var(--font-body);
  background:
    radial-gradient(circle at 20% 0%, #2a2117 0%, transparent 45%),
    var(--bg-deep);
  color: var(--text-main);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 0;
}

/* ==========================================================================
   CONTAINER PRINCIPAL DO CHAT
   ========================================================================== */

.chat-app {
  width: 100%;
  max-width: 520px;
  height: 100vh;
  max-height: 100vh;
  background: var(--bg-panel);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  box-shadow: 0 30px 60px rgba(0,0,0,0.5);
}

@media (min-width: 560px) {
  body { padding: 24px; }
  .chat-app {
    height: min(760px, calc(100vh - 48px));
    max-height: calc(100vh - 48px);
    border-radius: 20px;
    border: 1px solid #ffffff0f;
  }
}

/* ==========================================================================
   CABEÇALHO
   ========================================================================== */

.chat-header {
  background: var(--bg-header);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #ffffff0d;
  flex-shrink: 0;
  z-index: 2;
}

.header-info {
  display: flex;
  align-items: center;
  gap: 12px;
}

.avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: linear-gradient(155deg, var(--gold-soft), var(--gold-dim));
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--bg-deep);
  font-size: 16px;
  flex-shrink: 0;
}

.header-text h1 {
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: 0.5px;
  font-weight: 400;
  color: var(--text-main);
  line-height: 1.1;
}

.status {
  font-size: 12.5px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #5fd08a;
  box-shadow: 0 0 6px #5fd08a99;
  display: inline-block;
}

.status.offline .status-dot {
  background: var(--danger);
  box-shadow: 0 0 6px #d1594a99;
}

.header-actions {
  color: var(--text-muted);
  font-size: 18px;
  cursor: pointer;
  padding: 8px;
}

/* ==========================================================================
   ÁREA DE MENSAGENS
   ========================================================================== */

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 18px 14px 8px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  background-image:
    radial-gradient(circle at 1px 1px, #ffffff08 1px, transparent 1px);
  background-size: 22px 22px;
  scroll-behavior: smooth;
}

.chat-messages::-webkit-scrollbar {
  width: 6px;
}
.chat-messages::-webkit-scrollbar-thumb {
  background: #ffffff1a;
  border-radius: 10px;
}

.date-divider {
  display: flex;
  justify-content: center;
  margin: 6px 0 10px;
}

.date-divider span {
  font-size: 11.5px;
  color: var(--text-faint);
  background: #ffffff0a;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 0.3px;
}

/* ---- Mensagens ---- */

.message {
  display: flex;
  max-width: 82%;
  animation: messageIn 0.28s ease;
}

@keyframes messageIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.message.bot {
  align-self: flex-start;
}

.message.user {
  align-self: flex-end;
}

.bubble {
  padding: 10px 14px 8px;
  border-radius: var(--radius-lg);
  position: relative;
  line-height: 1.45;
  font-size: 14.5px;
  word-wrap: break-word;
  white-space: pre-wrap;
}

.message.bot .bubble {
  background: var(--bubble-bot);
  border-bottom-left-radius: var(--radius-sm);
  color: var(--text-main);
}

.message.user .bubble {
  background: var(--bubble-user);
  border: 1px solid var(--bubble-user-border);
  border-bottom-right-radius: var(--radius-sm);
  color: var(--text-main);
}

.bubble p {
  margin-bottom: 4px;
}

.bubble .time {
  display: block;
  text-align: right;
  font-size: 10.5px;
  color: var(--text-faint);
  margin-top: 2px;
}

.message.bot .bubble .time {
  color: var(--text-faint);
}

/* Mensagem de erro */
.message.error .bubble {
  background: #3a1f1c;
  border: 1px solid #d1594a44;
  color: #f0b8ae;
}

/* ==========================================================================
   INDICADOR "DIGITANDO..."
   ========================================================================== */

.typing-indicator {
  padding: 0 14px 6px;
  min-height: 0;
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.25s ease;
  flex-shrink: 0;
}

.typing-indicator.visible {
  max-height: 50px;
}

.typing-bubble {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--bubble-bot);
  padding: 12px 16px;
  border-radius: var(--radius-lg);
  border-bottom-left-radius: var(--radius-sm);
  width: fit-content;
}

.typing-bubble span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold-soft);
  opacity: 0.6;
  animation: typingBounce 1.2s infinite ease-in-out;
}

.typing-bubble span:nth-child(2) { animation-delay: 0.15s; }
.typing-bubble span:nth-child(3) { animation-delay: 0.3s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* ==========================================================================
   CAMPO DE ENTRADA
   ========================================================================== */

.chat-input-area {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  padding: 12px 14px;
  background: var(--bg-header);
  border-top: 1px solid #ffffff0d;
  flex-shrink: 0;
}

#messageInput {
  flex: 1;
  resize: none;
  max-height: 120px;
  min-height: 42px;
  padding: 11px 16px;
  border-radius: 22px;
  border: 1px solid #ffffff14;
  background: #ffffff0a;
  color: var(--text-main);
  font-family: var(--font-body);
  font-size: 14.5px;
  outline: none;
  transition: border-color 0.2s ease, background 0.2s ease;
  line-height: 1.4;
}

#messageInput::placeholder {
  color: var(--text-faint);
}

#messageInput:focus {
  border-color: var(--gold-dim);
  background: #ffffff10;
}

#sendButton {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(155deg, var(--gold-soft), var(--gold-dim));
  color: var(--bg-deep);
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: transform 0.15s ease, filter 0.15s ease;
}

#sendButton:hover {
  filter: brightness(1.08);
}

#sendButton:active {
  transform: scale(0.92);
}

#sendButton:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  filter: none;
  transform: none;
}

/* ==========================================================================
   RESPONSIVIDADE
   ========================================================================== */

@media (max-width: 400px) {
  .header-text h1 {
    font-size: 19px;
  }
  .bubble {
    font-size: 14px;
  }
}

/* Respeita preferência de movimento reduzido */
@media (prefers-reduced-motion: reduce) {
  .message {
    animation: none;
  }
  .typing-bubble span {
    animation: none;
    opacity: 1;
  }
}

</style>
</head>
<body>

  <div class="chat-app">

    <!-- Cabeçalho do chat -->
    <header class="chat-header">
      <div class="header-info">
        <div class="avatar">
          <i class="fa-solid fa-scissors"></i>
        </div>
        <div class="header-text">
          <h1>Barbearia Hebert</h1>
          <span class="status" id="statusText">
            <span class="status-dot"></span> Online
          </span>
        </div>
      </div>
      <div class="header-actions">
        <i class="fa-solid fa-ellipsis-vertical"></i>
      </div>
    </header>

    <!-- Área das mensagens -->
    <main class="chat-messages" id="chatMessages">
      <div class="date-divider"><span>Hoje</span></div>

      <!-- Mensagem inicial do assistente -->
      <div class="message bot">
        <div class="bubble">
          <p>Olá! Bem-vindo à <strong>Barbearia Hebert</strong> ✂️ Como posso te ajudar hoje?</p>
          <span class="time">--:--</span>
        </div>
      </div>
    </main>

    <!-- Indicador de digitação -->
    <div class="typing-indicator" id="typingIndicator">
      <div class="bubble typing-bubble">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- Campo de digitação -->
    <footer class="chat-input-area">
      <textarea
        id="messageInput"
        placeholder="Digite uma mensagem..."
        rows="1"
        maxlength="1000"
      ></textarea>
      <button id="sendButton" aria-label="Enviar mensagem">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </footer>

  </div>

  <script>
/* ==========================================================================
   BARBEARIA HEBERT — CHAT
   JavaScript puro (sem frameworks, sem bibliotecas externas)
   Comunicação exclusiva via Webhook do Make.com
   ========================================================================== */

/* --------------------------------------------------------------------------
   CONFIGURAÇÃO
   Preencha esta constante com a URL do seu Webhook do Make.com.
   Exemplo: "https://hook.us1.make.com/xxxxxxxxxxxxxxxxxxxxx"
   -------------------------------------------------------------------------- */
const WEBHOOK_URL = "https://hook.us2.make.com/e8un46rd8k2u3k7b24niwprapktviz1p";

/* --------------------------------------------------------------------------
   REFERÊNCIAS AOS ELEMENTOS DO DOM
   -------------------------------------------------------------------------- */
const chatMessages    = document.getElementById("chatMessages");
const messageInput    = document.getElementById("messageInput");
const sendButton      = document.getElementById("sendButton");
const typingIndicator = document.getElementById("typingIndicator");
const statusText      = document.getElementById("statusText");

/* --------------------------------------------------------------------------
   UTILITÁRIOS
   -------------------------------------------------------------------------- */

// Retorna o horário atual formatado como HH:MM
function getCurrentTime() {
  const now = new Date();
  const hours = String(now.getHours()).padStart(2, "0");
  const minutes = String(now.getMinutes()).padStart(2, "0");
  return `${hours}:${minutes}`;
}

// Rola a área de mensagens até o final (scroll automático)
function scrollToBottom() {
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// Ajusta a altura do textarea automaticamente conforme o texto digitado
function autoResizeInput() {
  messageInput.style.height = "auto";
  messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + "px";
}

/* --------------------------------------------------------------------------
   RENDERIZAÇÃO DE MENSAGENS
   -------------------------------------------------------------------------- */

// Cria e insere uma mensagem do usuário (lado direito)
function addUserMessage(text) {
  const messageEl = document.createElement("div");
  messageEl.className = "message user";

  messageEl.innerHTML = `
    <div class="bubble">
      <p></p>
      <span class="time">${getCurrentTime()}</span>
    </div>
  `;

  // Usamos textContent para inserir o texto com segurança (evita HTML injection)
  messageEl.querySelector("p").textContent = text;

  chatMessages.appendChild(messageEl);
  scrollToBottom();
}

// Cria e insere uma mensagem do assistente (lado esquerdo)
// O texto é exibido exatamente como recebido, sem qualquer interpretação
function addBotMessage(text) {
  const messageEl = document.createElement("div");
  messageEl.className = "message bot";

  messageEl.innerHTML = `
    <div class="bubble">
      <p></p>
      <span class="time">${getCurrentTime()}</span>
    </div>
  `;

  messageEl.querySelector("p").textContent = text;

  chatMessages.appendChild(messageEl);
  scrollToBottom();
}

// Cria e insere uma mensagem de erro (estilo diferenciado)
function addErrorMessage(text) {
  const messageEl = document.createElement("div");
  messageEl.className = "message bot error";

  messageEl.innerHTML = `
    <div class="bubble">
      <p></p>
      <span class="time">${getCurrentTime()}</span>
    </div>
  `;

  messageEl.querySelector("p").textContent = text;

  chatMessages.appendChild(messageEl);
  scrollToBottom();
}

/* --------------------------------------------------------------------------
   INDICADOR "DIGITANDO..."
   -------------------------------------------------------------------------- */

function showTyping() {
  typingIndicator.classList.add("visible");
  scrollToBottom();
}

function hideTyping() {
  typingIndicator.classList.remove("visible");
}

/* --------------------------------------------------------------------------
   COMUNICAÇÃO COM O WEBHOOK DO MAKE.COM
   -------------------------------------------------------------------------- */

// Envia a mensagem do usuário para o webhook e trata a resposta
async function sendMessage(message) {

  // Validação básica: não envia se o webhook não estiver configurado
  if (!WEBHOOK_URL) {
    hideTyping();
    addErrorMessage("Não foi possível conectar ao assistente.");
    console.warn("WEBHOOK_URL não configurada. Defina a URL do seu Webhook do Make.com em script.js.");
    return;
  }

  try {
    // Requisição POST enviando exatamente { "message": "texto digitado" }
    const response = await fetch(WEBHOOK_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: message
      })
    });

    // Se o servidor responder com status de erro (4xx, 5xx)
    if (!response.ok) {
      throw new Error(`Resposta HTTP inválida: ${response.status}`);
    }

    // Interpreta o corpo da resposta como JSON
    const data = await response.json();

    // Exibe somente o campo "reply", sem qualquer modificação
    hideTyping();
    addBotMessage(data.reply);

  } catch (error) {
    // Qualquer falha de rede, timeout ou resposta inválida cai aqui
    hideTyping();
    addErrorMessage("Não foi possível conectar ao assistente.");
    console.error("Erro ao comunicar com o webhook:", error);
  }
}

/* --------------------------------------------------------------------------
   FLUXO DE ENVIO DE MENSAGEM
   -------------------------------------------------------------------------- */

function handleSend() {
  const text = messageInput.value.trim();

  if (text === "") {
    return; // Não envia mensagens vazias
  }

  // Exibe a mensagem do usuário imediatamente
  addUserMessage(text);

  // Limpa e reseta o campo de digitação
  messageInput.value = "";
  autoResizeInput();
  messageInput.focus();

  // Mostra o indicador "Digitando..." enquanto aguarda a resposta
  showTyping();

  // Envia a mensagem para o webhook configurado
  sendMessage(text);
}

/* --------------------------------------------------------------------------
   EVENTOS
   -------------------------------------------------------------------------- */

// Clique no botão de enviar
sendButton.addEventListener("click", handleSend);

// Tecla Enter envia a mensagem (Shift+Enter quebra linha)
messageInput.addEventListener("keydown", (event) => {
  if (event.key === "Enter" && !event.shiftKey) {
    event.preventDefault();
    handleSend();
  }
});

// Ajusta a altura do campo de texto conforme o usuário digita
messageInput.addEventListener("input", autoResizeInput);

/* --------------------------------------------------------------------------
   INICIALIZAÇÃO
   -------------------------------------------------------------------------- */

// Define o horário correto na mensagem inicial de boas-vindas
document.addEventListener("DOMContentLoaded", () => {
  const firstTime = document.querySelector(".message.bot .time");
  if (firstTime) {
    firstTime.textContent = getCurrentTime();
  }
  scrollToBottom();
  messageInput.focus();
});

</script>
</body>
</html>
